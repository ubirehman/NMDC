services:
  # Development service with bind mount (use with: docker compose up --build)
  nextjs-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: nextjs-dev-image
    container_name: nextjs-dev-container
    environment:
      NODE_ENV: development
      PORT: "3120"
      HOSTNAME: "0.0.0.0"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3120:3120"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  # Production standalone service
  nextjs-standalone:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    image: nextjs-standalone-image
    container_name: nextjs-standalone-container
    environment:
      NODE_ENV: production
      PORT: "3120"
    ports:
      - "3121:3120"
    restart: unless-stopped

  # Production Bun service
  nextjs-standalone-with-bun:
    profiles: ["bun"]
    build:
      context: .
      dockerfile: Dockerfile.bun
    image: nextjs-standalone-bun-image
    container_name: nextjs-standalone-bun-container
    environment:
      NODE_ENV: production
      PORT: "3120"
    ports:
      - "3122:3120"
    restart: unless-stopped
