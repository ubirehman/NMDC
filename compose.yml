services:
  # Development service with bind mount (use with: docker compose up --build)
  nextjs-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: nextjs-dev-image
    container_name: nextjs-dev-container
    environment:
      NODE_ENV: development
      PORT: "3120"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_DREDGING_MARINE_APP_URL: "http://localhost:3121"
      NEXT_PUBLIC_INFRA_APP_URL: "http://localhost:3122"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3120:3120"
      - "3121:3121"
      - "3122:3122"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - /app/apps/nmdc-dredging-marine/.next
      - /app/apps/nmdc-infra/.next
    restart: unless-stopped

  # Production standalone service
  nextjs-standalone:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    image: nextjs-standalone-image
    container_name: nextjs-standalone-container
    environment:
      NODE_ENV: production
      PORT: "3120"
      NEXT_PUBLIC_DREDGING_MARINE_APP_URL: "http://localhost:3121"
      NEXT_PUBLIC_INFRA_APP_URL: "http://localhost:3122"
    ports:
      - "3120:3120"
      - "3121:3121"
      - "3122:3122"
    restart: unless-stopped
